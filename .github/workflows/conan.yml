name: conan

# Builds c4core with its fast_float dependency provided by conan (conanfile.py)
# instead of the old vendored copy under src/c4/ext. This verifies the project
# can resolve + download its conan deps and cmake-compile against them.

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: conan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  conan:
    name: conan/cmake (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  configure_preset: conan-release }
          - { os: macos-latest,   configure_preset: conan-release }
          - { os: windows-latest, configure_preset: conan-default }
    steps:
      - uses: actions/checkout@v4
        with:
          # cmake/ and debugbreak are still submodules; fast_float no longer is
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install conan
        run: |
          python -m pip install --upgrade pip
          python -m pip install "conan>=2.0"
          conan --version

      - name: Detect conan profile
        run: conan profile detect --force

      - name: Install dependencies (downloads fast_float)
        run: >
          conan install . --build=missing -s build_type=Release

      - name: Configure
        run: cmake --preset ${{ matrix.configure_preset }}

      - name: Build
        run: cmake --build --preset conan-release --parallel
